name: Ingestion (update dataset)

on:
  schedule:
    - cron: "17 6 * * *" # daily, adjust as needed
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  ingest:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install app deps (incl. optional)
        working-directory: app
        env:
          npm_config_include: optional
        run: |
          npm install --include=optional --no-audit --no-fund
          npm rebuild --no-audit --no-fund

      - name: Run ingestion
        working-directory: app
        run: npm run ingest

      - name: Commit and push updated dataset branch
        run: |
          if git diff --quiet --exit-code -- app/public/data/dataset.json; then
            echo "No dataset changes; skipping commit."
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          # Ensure we base our branch on the latest remote automation branch if it exists.
          git fetch origin automation/ingest-dataset || true
          if git rev-parse --verify origin/automation/ingest-dataset >/dev/null 2>&1; then
            git checkout -B automation/ingest-dataset origin/automation/ingest-dataset
          else
            git checkout -B automation/ingest-dataset
          fi

          git add app/public/data/dataset.json
          git commit -m "chore(data): ingest sources and update dataset"
          # Safe to force-push this automation-only branch without touching main.
          git push -f origin automation/ingest-dataset

