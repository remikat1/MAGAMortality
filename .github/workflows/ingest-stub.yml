name: Ingestion (update dataset)

on:
  schedule:
    - cron: "17 6 * * *" # daily, adjust as needed
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  ingest:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install app deps (incl. optional)
        working-directory: app
        env:
          npm_config_include: optional
        run: |
          npm install --include=optional --no-audit --no-fund
          npm rebuild --no-audit --no-fund

      - name: Run ingestion
        working-directory: app
        run: npm run ingest

      - name: Create pull request with updated dataset
        uses: peter-evans/create-pull-request@v7
        with:
          commit-message: "chore(data): ingest sources and update dataset"
          title: "Ingestion: update dataset.json"
          body: |
            This PR was generated by the scheduled ingestion workflow.

            - Updates `app/public/data/dataset.json`
            - Adds/updates items/estimates/sources from scrapeable sources (Federal Register, ICE collection links, BOP deaths page, ProPublica RSS)

            Review before merge. Some entries are link/collection records with `value: 0` until curated.
          branch: "automation/ingest-dataset"
          delete-branch: true

