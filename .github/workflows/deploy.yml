name: Deploy (GitHub Pages)

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install
        working-directory: app
        env:
          # Work around npm optional-deps install flakiness for Rollup native bundles.
          # See: https://github.com/npm/cli/issues/4828
          npm_config_include: optional
        run: |
          rm -rf node_modules package-lock.json
          npm install --include=optional --no-audit --no-fund
          # Safety net: ensure Rollup's Linux native package is present on runners.
          npm install --no-save @rollup/rollup-linux-x64-gnu --no-audit --no-fund || true
          npm rebuild --no-audit --no-fund

      - name: Build
        working-directory: app
        run: npm run build

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: app/dist

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

